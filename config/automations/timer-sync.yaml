## Topic structure

```
{discovery_prefix}/{domain}/{slug}/config   ÔćÉ MQTT discovery payload
{mqtt_base}/{domain}/{slug}/state           ÔćÉ Current state
{mqtt_base}/{domain}/{slug}/{attribute}     ÔćÉ Attribute sub-topics
{mqtt_base}/{domain}/{slug}/set             ÔćÉ Inbound command topic
{mqtt_base}/{domain}/{slug}/set_{attr}      ÔćÉ Inbound attribute command topics
{mqtt_base}/{domain}/{slug}/send_command    ÔćÉ Vendor-specific commands (vacuum, remote)
```

## Supported domains

`light`, `switch`, `lock`, `cover`, `climate`, `fan`, `media_player`, `number`, `select`, `text`, `button`, `scene`, `script`, `vacuum`, `humidifier`, `alarm_control_panel`, `valve`, `water_heater`, `siren`, `lawn_mower`, `remote`, `timer`, `input_boolean`, `input_number`, `input_text`, `input_select`, `input_datetime`, `input_button`

## Domain mapping

HA helper domains are mapped to their MQTT equivalents:

| HA domain | MQTT domain |
|---|---|
| `input_boolean` | `switch` |
| `input_number` | `number` |
| `input_text` | `text` |
| `input_select` | `select` |
| `input_datetime` | `datetime` |
| `input_button` | `button` |

## Attribute sub-topics

| Domain | Sub-topics published |
|---|---|
| `light` | `brightness`, `color_temp`, `rgb`, `hs`, `xy`, `effect` (if supported) |
| `fan` | `percentage`, `preset_mode`, `oscillation`, `direction` (only if supported by device) |
| `climate` | `temperature`, `current_temperature`, `target_temp_high`, `target_temp_low`, `action`, `fan_mode`, `swing_mode`, `preset_mode` |
| `cover` | `position`, `tilt` |
| `media_player` | `volume`, `muted`, `source`, `sound_mode`, `media_title`, `media_artist` |
| `humidifier` | `target_humidity`, `current_humidity`, `mode` |
| `water_heater` | `temperature`, `current_temperature`, `mode`, `away_mode` |
| `vacuum` | `battery_level`, `status`, `fan_speed` (if supported) |
| `alarm_control_panel` | `code_format` |
| `valve` | `position` |
| `lawn_mower` | `battery_level` |
| `timer` | `duration`, `finishes_at` |

All attribute sub-topics are only published when the value is actually present on the entity ÔÇö no empty payloads.

## Downstream HA setup

To have a downstream HA instance auto-discover the entities, add this to its `configuration.yaml` matching your `discovery_prefix` setting:

```yaml
mqtt:
  discovery_prefix: homeassistant-guest
```

## Multiple instances

This addon supports multiple instances. Each instance must have a unique `mqtt_base` value ÔÇö this is used as the MQTT topic namespace and as the entity unique ID prefix, so two instances with different `mqtt_base` values will produce completely separate, non-conflicting entities in the downstream HA.

**Example ÔÇö two instances:**

| | Instance 1 | Instance 2 |
|---|---|---|
| `mqtt_base` | `homeassistant-guest` | `homeassistant-iot` |
| `discovery_prefix` | `homeassistant-guest` | `homeassistant-iot` |

## Enable / disable toggle

You can point the addon at any binary HA entity ÔÇö a `switch`, `input_boolean`, or any other entity whose state is `on`/`off` ÔÇö to control whether the addon is actively publishing. When the entity turns off, the addon unpublishes all discovery payloads from the broker and stops publishing state. When it turns back on, it re-expands the entity list and re-runs discovery automatically.

Set the `enabled_entity` config option to the entity ID of your toggle:

```
enabled_entity: input_boolean.mqtt_downstream_enabled
```

Any entity with a binary-style state works ÔÇö the addon treats `off`, `false`, `0`, `unavailable`, and `unknown` as disabled, and anything else as enabled.

**Behaviour:**

| State | What happens |
|---|---|
| Turns **off** | Discovery payloads are unpublished (entities removed from downstream HA), state publishing stops. Any state changes that arrive while disabled are silently dropped |
| Turns **on** | Entity list is re-expanded, discovery re-runs, state publishing resumes |
| **Off at startup** | Addon starts in disabled state ÔÇö no discovery, no publishing, until toggled on |

This is entirely internal to the addon ÔÇö no automations or `rest_command` needed.

When the addon is stopped, the downstream HA will retain the last published states from the broker until they are overwritten or the broker is restarted ÔÇö entities will not disappear, they will just stop updating.

To re-run discovery without restarting the addon, trigger any of the following:

- Edit any option in a configured dropdown helper ÔÇö the state change triggers re-expansion and re-discovery automatically
- Publish `online` to `{mqtt_base}/status` via any MQTT client


## Timers

Timer entities are published as a `sensor` on the downstream HA (HA has no native MQTT timer discovery type). The sensor state reflects `idle`, `active`, or `paused`, with `duration` and `finishes_at` as attributes.

To get a fully functional native timer on guest HA that counts down live, create a matching `timer` entity and use an automation to mirror the state:

**1. Declare the timer in guest HA `configuration.yaml`:**

```yaml
timer:
  guest_bathroom_vent_timer:
    name: "Guest Bathroom Vent Timer"
    icon: mdi:timer-outline
```

**2. Add the sync automation to `/config/automations/timer-sync.yaml`:**

```yaml
automation:
  - alias: "Sync MQTT Downstream Timers"
    description: "Mirrors source timer states to native guest HA timer entities"
    trigger:
      - platform: state
        entity_id:
          - sensor.guest_bathroom_vent_timer
          # - sensor.another_timer
    action:
      - variables:
          timer_entity: "{{ trigger.entity_id | replace('sensor.', 'timer.') }}"
          finishes_at: "{{ state_attr(trigger.entity_id, 'finishes_at') }}"
          duration: "{{ state_attr(trigger.entity_id, 'duration') or '00:00:00' }}"
          remaining_secs: >
            {% if finishes_at %}
              {{ [(as_datetime(finishes_at) - now()).total_seconds() | int, 0] | max }}
            {% else %}
              0
            {% endif %}
          remaining_formatted: >
            {% set s = remaining_secs | int %}
            {{ '%02d:%02d:%02d' | format(s // 3600, (s % 3600) // 60, s % 60) }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'active' }}"
            sequence:
              - service: timer.start
                target:
                  entity_id: "{{ timer_entity }}"
                data:
                  duration: "{{ remaining_formatted if finishes_at else duration }}"
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'paused' }}"
            sequence:
              - service: timer.pause
                target:
                  entity_id: "{{ timer_entity }}"
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'idle' }}"
            sequence:
              - service: timer.cancel
                target:
                  entity_id: "{{ timer_entity }}"
    mode: parallel
    max: 10
```

The automation derives the target `timer.` entity ID automatically from the triggering `sensor.` entity ID, so adding a new timer only requires adding one line to the trigger list. Guest HA users can interact with the timer locally ÔÇö the automation will re-sync it to the source state on the next state change event.

If you split automations into separate files, include the directory in `configuration.yaml`:
```yaml
automation: !include_dir_merge_list automations/
```

## TLS / Encrypted MQTT

Encrypting MQTT traffic is recommended whenever your broker is reachable across network boundaries. See [docs/mqtt-tls.md](https://github.com/maxandcheeses/ha-mqtt-downstream-addon/blob/main/docs/mqtt-tls.md) for the full explanation and cert generation guide.

### Converting cert files to base64

The addon accepts certs as base64 strings so they can be stored in the config UI without file mounts.

**Linux:**
```bash
cat ca.crt     | base64 -w 0   # Ôćĺ broker_tls_ca
cat client.crt | base64 -w 0   # Ôćĺ broker_tls_cert
cat client.key | base64 -w 0   # Ôćĺ broker_tls_key
```

**macOS:**
```bash
cat ca.crt     | base64        # Ôćĺ broker_tls_ca
cat client.crt | base64        # Ôćĺ broker_tls_cert
cat client.key | base64        # Ôćĺ broker_tls_key
```

Paste the output (a single long string) directly into the config field. Leave `broker_tls_cert` and `broker_tls_key` blank if your broker does not require mutual TLS ÔÇö only `broker_tls_ca` is needed for standard one-way TLS.

If no CA cert is provided, the addon will connect on plain TCP and log a warning at startup.

## Notes

- **TLS encryption:** MQTT traffic is unencrypted by default. If your broker crosses network boundaries (VLANs, tunnels, guest networks), configure TLS using the `broker_tls_ca` option. See [docs/mqtt-tls.md](https://github.com/maxandcheeses/ha-mqtt-downstream-addon/blob/main/docs/mqtt-tls.md) for cert generation instructions and why this matters
- Glob patterns (e.g. `light.*`, `*.kitchen_*`) are supported in the entity list and exclude list
- Area entities are resolved via the HA entity registry ÔÇö area assignment changes are picked up on the next dropdown change or restart
- The addon connects directly to the broker; it does not route through HA's MQTT integration
- **Broker deployment options:** the addon supports two architectures ÔÇö a shared internal broker or a broker running on the guest network. With a guest-side broker, Main HA pushes outward and Guest HA never needs a connection back into your trusted network. The broker host is just a config option. See `ARCHITECTURE.md` for diagrams and a security comparison of both options
- **Recommended:** use a broker that supports per-user topic ACLs rather than HA's built-in MQTT broker. HA's integration only supports per-user credentials with no topic-level restrictions. **EMQX** is a good choice ÔÇö ACLs are manageable via its web dashboard without editing config files. ACLs are especially important in the shared broker model; with a guest-side broker they are less critical but still recommended as defence in depth. See `ARCHITECTURE.md` for an example ACL config
- Retained state topics are read-only on the downstream side ÔÇö restoring retained state updates the UI but does not trigger automations or services
- When an entity is removed from the resolved list, its discovery topic is cleared (empty retained payload) causing the downstream HA to remove the entity. State and attribute sub-topics are **not** cleared from the broker ÔÇö they remain with their last retained value until manually deleted or the broker is restarted

