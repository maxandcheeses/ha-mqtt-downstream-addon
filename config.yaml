name: MQTT Downstream
description: >-
  Syncs Home Assistant entities to a downstream MQTT broker.
  Publishes discovery, state, and attributes. Routes inbound commands back to HA.
  Entities are resolved additively from entity globs, areas, and domain includes,
  with optional glob-based exclusions. Configurable via HA helper entities.
version: "1.0.58"
slug: mqtt_downstream
init: false
multi_instance: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
mqtt: true
services:
  - mqtt:need
url: "https://github.com/maxandcheeses/ha-mqtt-downstream-addon"
panel_icon: mdi:waves-arrow-right

options:
  mqtt_base: homeassistant-guest
  discovery_prefix: homeassistant-guest
  enabled_entity: ""
  entities_select: input_select.mqtt_downstream_entities
  areas_select: input_select.mqtt_downstream_areas
  domains_select: input_select.mqtt_downstream_domains
  excludes_select: input_select.mqtt_downstream_excludes
  broker_host: ""
  broker_port: ""
  broker_username: ""
  broker_password: ""
  broker_tls_ca: ""
  broker_tls_cert: ""
  broker_tls_key: ""
  discovery_on_startup: true
  discovery_on_dropdown_change: true
  discovery_on_birth: true
  unpublish_on_remove: true
  heartbeat_interval_seconds: 60
  retain: true
  debug: false

schema:
  mqtt_base: str
  discovery_prefix: str
  enabled_entity: str?
  entities_select: str?
  areas_select: str?
  domains_select: str?
  excludes_select: str?
  broker_host: str
  broker_port: int?
  broker_username: str
  broker_password: password
  broker_tls_ca: str?
  broker_tls_cert: str?
  broker_tls_key: str?
  discovery_on_startup: bool
  discovery_on_dropdown_change: bool
  discovery_on_birth: bool
  unpublish_on_remove: bool
  heartbeat_interval_seconds: float
  retain: bool
  debug: bool